---
- name: Upgrade WTI Device
  hosts: "{{ ansible_hosts }}"
  collections:
    - wti.remote
  connection: local
  gather_facts: false

  tasks:
    - name: Set default for use_https
      set_fact:
        use_https: false
      when: use_https is undefined

    - name: Set default for validate_certs
      set_fact:
        validate_certs: false
      when: validate_certs is undefined

    - name: Set default for use_force
      set_fact:
        use_force: false
      when: use_force is undefined

    - name: Set default for removefileonexit
      set_fact:
        removefileonexit: true
      when: removefileonexit is undefined

    - name: Upgrade WTI device checking online for new version
      cpm_firmware_update:
        cpm_url: "{{ ansible_host }}"
        cpm_username: "{{ ansible_user }}"
        cpm_password: "{{ ansible_pw }}"
        use_https: "{{ use_https }}"
        use_force: "{{ use_force }}"
        removefileonexit: "{{ removefileonexit }}"
        validate_certs: "{{ validate_certs }}"
        cpm_path: "/tmp/"
      register: testout

    - name: Show firmware upgrade result
      debug:
        var: testout
